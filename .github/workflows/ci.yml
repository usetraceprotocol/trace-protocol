name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  FOUNDRY_PROFILE: "ci"

jobs:
  typescript:
    name: TypeScript (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test:unit
        env:
          ETHEREUM_RPC_URL: https://eth.llamarpc.com

  solidity:
    name: Solidity (forge fmt + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/trace-attestation
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge --version
      - run: forge fmt --check
      - run: forge build --sizes
      - run: forge test -vvv

  python:
    name: Python (classifier + inference)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r models/training/requirements.txt
      - run: pip install -r models/inference/requirements.txt
      - run: python scripts/validate-model.py
